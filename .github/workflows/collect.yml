name: 采集YouTube烟花视频数据

on:
  workflow_dispatch:
    inputs:
      results_per_query:
        description: '每个搜索词返回结果数 (1-50)'
        required: false
        default: '25'
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install openpyxl yt-dlp

      - name: 采集数据
        run: |
          # Override max results if user specified
          if [ "${{ github.event.inputs.results_per_query }}" != "25" ]; then
            sed -i "s/MAX_RESULTS_PER_QUERY = 25/MAX_RESULTS_PER_QUERY = ${{ github.event.inputs.results_per_query }}/" collect_data.py
          fi
          python collect_data.py

      - name: 上传Excel结果
        uses: actions/upload-artifact@v4
        with:
          name: firework_video_data
          path: firework_video_data.xlsx
          retention-days: 30
