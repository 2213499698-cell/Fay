name: 采集YouTube烟花视频数据

on:
  workflow_dispatch:
    inputs:
      results_per_query:
        description: '每个搜索词返回结果数 (1-50)'
        required: false
        default: '25'
        type: string

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install openpyxl

      - name: 采集数据
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.results_per_query }}" != "25" ]; then
            sed -i "s/MAX_RESULTS_PER_QUERY = 25/MAX_RESULTS_PER_QUERY = ${{ github.event.inputs.results_per_query }}/" collect_data.py
          fi
          python collect_data.py

      - name: 上传Excel结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firework_video_data
          path: firework_video_data.xlsx
          retention-days: 30

      - name: 提交Excel到仓库
        if: always()
        run: |
          git config user.name "Firework Bot"
          git config user.email "bot@firework.local"
          git add firework_video_data.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: update firework data [skip ci]"
            git push origin master
          fi
